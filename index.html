<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pong Animation Generator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a1a;
        color: #fff;
      }
      .container {
        display: flex;
        height: 100vh;
      }
      .sidebar {
        width: 350px;
        background: #2a2a2a;
        padding: 20px;
        overflow-y: auto;
        border-right: 2px solid #444;
      }
      .preview {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        position: relative;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 20px;
        color: #00ccff;
      }
      .section {
        margin-bottom: 25px;
      }
      .section h3 {
        font-size: 14px;
        margin-bottom: 10px;
        color: #aaa;
        text-transform: uppercase;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 5px;
        color: #ccc;
      }
      input[type="text"],
      input[type="number"],
      textarea {
        width: 100%;
        padding: 8px;
        background: #1a1a1a;
        border: 1px solid #444;
        color: #fff;
        border-radius: 4px;
        font-size: 12px;
      }
      textarea {
        resize: vertical;
        min-height: 60px;
        font-family: monospace;
      }
      input[type="color"] {
        width: 100%;
        height: 40px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      input[type="range"] {
        width: 100%;
      }
      .btn {
        width: 100%;
        padding: 12px;
        background: #00ccff;
        color: #000;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
        margin-top: 10px;
      }
      .btn:hover {
        background: #00aadd;
      }
      .btn-secondary {
        background: #444;
        color: #fff;
      }
      .btn-secondary:hover {
        background: #555;
      }
      canvas {
        border: 2px solid #444;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }
      .position-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        margin-top: 10px;
      }
      .pos-btn {
        padding: 8px;
        background: #1a1a1a;
        border: 1px solid #444;
        color: #fff;
        cursor: pointer;
        font-size: 11px;
        border-radius: 4px;
      }
      .pos-btn:hover {
        background: #333;
      }
      .pos-btn.active {
        background: #00ccff;
        color: #000;
      }
      .input-group {
        display: flex;
        gap: 10px;
      }
      .input-group > div {
        flex: 1;
      }
      .value-display {
        display: inline-block;
        margin-left: 10px;
        color: #00ccff;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <h1>🎮 Pong Animation Generator</h1>

        <div class="section">
          <h3>📝 Text Content</h3>
          <label>Line 1 (Large Text)</label>
          <textarea id="text1" placeholder="Enter text...">Maulik</textarea>
          <label style="margin-top: 10px">Line 2 (Small Text)</label>
          <textarea id="text2" placeholder="Enter text...">
Code.Commit.Repeat</textarea
          >
        </div>

        <div class="section">
          <h3>📍 Text Position & Size</h3>
          <label>Large Text Position</label>
          <div class="input-group">
            <div>
              <label>X</label><input type="number" id="text1X" value="250" />
            </div>
            <div>
              <label>Y</label><input type="number" id="text1Y" value="100" />
            </div>
          </div>
          <label style="margin-top: 10px">Large Text Size</label>
          <input
            type="number"
            id="text1Size"
            value="20"
            min="5"
            max="50"
            step="1"
          />
          <label style="margin-top: 10px">Small Text Position</label>
          <div class="input-group">
            <div>
              <label>X</label><input type="number" id="text2X" value="50" />
            </div>
            <div>
              <label>Y</label><input type="number" id="text2Y" value="420" />
            </div>
          </div>
          <label style="margin-top: 10px">Small Text Size</label>
          <input
            type="number"
            id="text2Size"
            value="10"
            min="3"
            max="30"
            step="1"
          />
        </div>

        <div class="section">
          <h3>🎨 Text Colors</h3>
          <label>Base Color</label>
          <input type="color" id="textColor" value="#00ccff" />
          <label style="margin-top: 10px">Glow Color</label>
          <input type="color" id="glowColor" value="#00ccff" />
          <label style="margin-top: 10px">Hit Color</label>
          <input type="color" id="hitColor" value="#222b55" />
        </div>

        <div class="section">
          <h3>⚽ Ball Settings</h3>
          <label
            >Speed <span class="value-display" id="ballSpeedVal">3</span></label
          >
          <input
            type="range"
            id="ballSpeed"
            min="1"
            max="10"
            step="0.5"
            value="3"
          />
          <label style="margin-top: 10px">Color</label>
          <input type="color" id="ballColor" value="#ffffff" />
          <label style="margin-top: 10px">Size</label>
          <input type="number" id="ballSize" value="12" min="5" max="30" />
        </div>

        <div class="section">
          <h3>🎨 Background</h3>
          <label>Color 1</label>
          <input type="color" id="bgColor1" value="#0b0b0b" />
          <label style="margin-top: 10px">Color 2</label>
          <input type="color" id="bgColor2" value="#1a1a1a" />
          <label style="margin-top: 10px"
            >Animation Speed
            <span class="value-display" id="bgSpeedVal">5</span></label
          >
          <input type="range" id="bgSpeed" min="1" max="20" value="5" />
        </div>

        <div class="section">
          <h3>📏 Canvas Size</h3>
          <label>Width</label>
          <input
            type="number"
            id="canvasWidth"
            value="1200"
            min="600"
            max="2400"
            step="100"
          />
          <label style="margin-top: 10px">Height</label>
          <input
            type="number"
            id="canvasHeight"
            value="600"
            min="400"
            max="1200"
            step="50"
          />
        </div>

        <div class="section">
          <h3>🎯 Paddle/Bar Settings</h3>
          <label>Color</label>
          <input type="color" id="barColor" value="#ffffff" />
          <label style="margin-top: 10px"
            >Speed
            <span class="value-display" id="barSpeedVal">0.3</span></label
          >
          <input
            type="range"
            id="barSpeed"
            min="0.1"
            max="1"
            step="0.1"
            value="0.3"
          />
        </div>

        <button class="btn" onclick="generateAnimation()">
          🚀 Generate Animation
        </button>
        <button class="btn btn-secondary" onclick="downloadHTML()">
          💾 Download HTML
        </button>
      </div>

      <div class="preview">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>

    <script>
      let config = {};
      let animationRunning = false;

      // Update value displays
      document.getElementById("ballSpeed").oninput = (e) => {
        document.getElementById("ballSpeedVal").textContent = e.target.value;
      };
      document.getElementById("bgSpeed").oninput = (e) => {
        document.getElementById("bgSpeedVal").textContent = e.target.value;
      };
      document.getElementById("barSpeed").oninput = (e) => {
        document.getElementById("barSpeedVal").textContent = e.target.value;
      };

      async function generateAnimation() {
        config = {
          text1: document.getElementById("text1").value,
          text2: document.getElementById("text2").value,
          text1X: parseInt(document.getElementById("text1X").value),
          text1Y: parseInt(document.getElementById("text1Y").value),
          text1Size: parseInt(document.getElementById("text1Size").value),
          text2X: parseInt(document.getElementById("text2X").value),
          text2Y: parseInt(document.getElementById("text2Y").value),
          text2Size: parseInt(document.getElementById("text2Size").value),
          textColor: document.getElementById("textColor").value,
          glowColor: document.getElementById("glowColor").value,
          hitColor: document.getElementById("hitColor").value,
          ballSpeed: parseFloat(document.getElementById("ballSpeed").value),
          ballColor: document.getElementById("ballColor").value,
          ballSize: parseInt(document.getElementById("ballSize").value),
          bgColor1: document.getElementById("bgColor1").value,
          bgColor2: document.getElementById("bgColor2").value,
          bgSpeed: parseFloat(document.getElementById("bgSpeed").value),
          canvasWidth: parseInt(document.getElementById("canvasWidth").value),
          canvasHeight: parseInt(document.getElementById("canvasHeight").value),
          barColor: document.getElementById("barColor").value,
          barSpeed: parseFloat(document.getElementById("barSpeed").value),
        };

        const response = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(config),
        });

        const data = await response.json();
        if (data.success) {
          loadAnimation(data.ascii);
        }
      }

      function loadAnimation(ascii) {
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = config.canvasWidth;
        canvas.height = config.canvasHeight;

        const gridSize = config.text1Size;
        const smallGridSize = config.text2Size;
        const chars = [];
        const waves = [];

        // Load large text
        ascii.pixelText.forEach((line, row) => {
          line.split("").forEach((char, col) => {
            if (char === "#") {
              chars.push({
                x: config.text1X + col * gridSize,
                y: config.text1Y + row * gridSize,
                size: gridSize,
                hit: false,
              });
            }
          });
        });

        // Load small text
        ascii.pixelTextSmall.forEach((line, row) => {
          line.split("").forEach((char, col) => {
            if (char === "#") {
              chars.push({
                x: config.text2X + col * smallGridSize,
                y: config.text2Y + row * smallGridSize,
                size: smallGridSize,
                hit: false,
              });
            }
          });
        });

        let ball = {
          x: canvas.width / 2,
          y: canvas.height / 2,
          dx: config.ballSpeed,
          dy: config.ballSpeed * 0.7,
          radius: config.ballSize,
        };

        const platforms = [
          { x: 0, y: 100, width: 15, height: 200, axis: "y" },
          { x: canvas.width - 15, y: 100, width: 15, height: 200, axis: "y" },
          { x: 400, y: 0, width: 200, height: 15, axis: "x" },
          { x: 400, y: canvas.height - 15, width: 200, height: 15, axis: "x" },
        ];

        function updateBall() {
          ball.x += ball.dx;
          ball.y += ball.dy;

          if (ball.x <= 0 || ball.x >= canvas.width) ball.dx *= -1;
          if (ball.y <= 0 || ball.y >= canvas.height) ball.dy *= -1;

          for (let i = 0; i < chars.length; i++) {
            const c = chars[i];
            if (c.hit) continue;
            const dx = Math.abs(ball.x - c.x);
            const dy = Math.abs(ball.y - c.y);
            if (
              dx < ball.radius + c.size / 2 &&
              dy < ball.radius + c.size / 2
            ) {
              c.hit = true;
              waves.push({ x: ball.x, y: ball.y, radius: 0, alpha: 1 });
              if (dx > dy) ball.dx *= -1;
              else ball.dy *= -1;
              break;
            }
          }

          platforms.forEach((p) => {
            if (
              ball.x + ball.radius > p.x &&
              ball.x - ball.radius < p.x + p.width &&
              ball.y + ball.radius > p.y &&
              ball.y - ball.radius < p.y + p.height
            ) {
              waves.push({ x: ball.x, y: ball.y, radius: 0, alpha: 1 });
              if (p.axis === "y") ball.dx *= -1;
              else ball.dy *= -1;
            }
          });
        }

        function movePlatforms() {
          platforms.forEach((p) => {
            const target =
              p.axis === "y" ? ball.y - p.height / 2 : ball.x - p.width / 2;
            if (p.axis === "y") {
              p.y += (target - p.y) * config.barSpeed;
              p.y = Math.max(0, Math.min(canvas.height - p.height, p.y));
            } else {
              p.x += (target - p.x) * config.barSpeed;
              p.x = Math.max(0, Math.min(canvas.width - p.width, p.x));
            }
          });
        }

        function drawWaves() {
          for (let i = waves.length - 1; i >= 0; i--) {
            const w = waves[i];
            ctx.beginPath();
            ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,255,255,${w.alpha})`;
            ctx.lineWidth = 2;
            ctx.stroke();
            w.radius += 2;
            w.alpha -= 0.02;
            if (w.alpha <= 0) waves.splice(i, 1);
          }
        }

        function draw() {
          const gradSize = 40;
          for (let y = 0; y < canvas.height; y += gradSize) {
            for (let x = 0; x < canvas.width; x += gradSize) {
              const brightness =
                20 +
                Math.floor(
                  10 * Math.sin((x + y + Date.now() / config.bgSpeed) * 0.01),
                );
              const color = interpolateColor(
                config.bgColor1,
                config.bgColor2,
                brightness / 40,
              );
              ctx.fillStyle = color;
              ctx.fillRect(x, y, gradSize, gradSize);
            }
          }

          drawWaves();

          chars.forEach((c) => {
            ctx.fillStyle = c.hit ? config.hitColor : config.textColor;
            ctx.shadowColor = c.hit ? config.hitColor : config.glowColor;
            ctx.shadowBlur = 10;
            ctx.fillRect(c.x - c.size / 2, c.y - c.size / 2, c.size, c.size);
            ctx.shadowBlur = 0;
          });

          ctx.fillStyle = config.ballColor;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = config.barColor;
          platforms.forEach((p) => {
            ctx.fillRect(p.x, p.y, p.width, p.height);
          });
        }

        function interpolateColor(color1, color2, factor) {
          const c1 = hexToRgb(color1);
          const c2 = hexToRgb(color2);
          const r = Math.round(c1.r + (c2.r - c1.r) * factor);
          const g = Math.round(c1.g + (c2.g - c1.g) * factor);
          const b = Math.round(c1.b + (c2.b - c1.b) * factor);
          return `rgb(${r},${g},${b})`;
        }

        function hexToRgb(hex) {
          const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
          return result
            ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16),
              }
            : { r: 0, g: 0, b: 0 };
        }

        function animate() {
          requestAnimationFrame(animate);
          updateBall();
          movePlatforms();
          draw();
        }

        animate();
      }

      function downloadHTML() {
        if (!config.text1) {
          alert("Please generate animation first!");
          return;
        }

        fetch("/download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(config),
        })
          .then((res) => res.blob())
          .then((blob) => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "pong_animation.html";
            a.click();
          });
      }
    </script>
  </body>
</html>
